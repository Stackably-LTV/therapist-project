services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    # ports:
    #   - '3000:3000' # Commented out to avoid VPS port conflicts. Dokploy/Traefik will handle ingress.
    expose:
      - '3000'
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - dokploy-network

  # Ensure your DATABASE_URL uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  mongo:
    image: mongo:latest
    # ports:
    #   - '27017:27017'
    expose:
      - '27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - default
      - dokploy-network
    # logging:
    #   driver: none # Disabled logging prevented Dokploy from showing logs. Re-enabling.

  minio:
    image: minio/minio
    # ports:
    #   - '9000:9000'
    #   - '9001:9001'
    expose:
      - '9000'
      - '9001'
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - default
      - dokploy-network

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
      /usr/bin/mc mb myminio/${S3_BUCKET};
      /usr/bin/mc anonymous set public myminio/${S3_BUCKET};
      exit 0;
      "
    networks:
      - default
      - dokploy-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN
    depends_on:
      - payload
    networks:
      - default
      - dokploy-network

volumes:
  data:
  minio_data:
  # pgdata:
  node_modules:

networks:
  dokploy-network:
    external: true
